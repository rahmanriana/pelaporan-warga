<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Laporan - Pelaporan Warga (API)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/pelaporan.css" rel="stylesheet" />
</head>
<body>
  <div id="topbar"></div>

  <div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h4 class="fw-bold mb-0" id="title">Tambah Laporan</h4>
      <a class="btn btn-outline-primary btn-sm" href="/frontend/laporans.html">Kembali</a>
    </div>

    <div id="alert"></div>

    <div class="card card-laporan">
      <div class="card-body p-4">
        <form id="formLaporan">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Judul</label>
              <input class="form-control" name="judul" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">Keluhan</label>
              <input class="form-control" name="kategori" required placeholder="Contoh: Jalan berlubang, sampah menumpuk, dll." />
            </div>

            <div class="col-md-6">
              <label class="form-label">Lokasi</label>
              <input class="form-control" name="lokasi" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">Nomor HP</label>
              <input class="form-control" name="no_hp" required />
              <div class="form-text">Contoh: 08xxxxxxxxxx atau +62xxxxxxxxxx</div>
            </div>

            <div class="col-12">
              <label class="form-label">Deskripsi</label>
              <textarea class="form-control" name="deskripsi" rows="4" required></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">Foto (opsional)</label>
              <input class="form-control" type="file" name="foto" accept="image/*" />
              <div class="form-text">Maks 2MB.</div>
            </div>

            <div class="col-12" id="adminStatusWrap" style="display:none">
              <label class="form-label">Status (admin)</label>
              <select class="form-select" name="status">
                <option value="menunggu">menunggu</option>
                <option value="diproses">diproses</option>
                <option value="selesai">selesai</option>
                <option value="ditolak">ditolak</option>
              </select>
            </div>

            <div class="col-12" id="adminTanggapanWrap" style="display:none">
              <label class="form-label">Penanganan yang akan dilakukan (admin)</label>
              <textarea class="form-control" name="isi_tanggapan" rows="3" placeholder="Contoh: Akan dilakukan pengecekan lokasi dan pembersihan pada ..."></textarea>
              <div class="form-text">Wajib diisi saat admin mengubah status.</div>
            </div>

            <div class="col-12 d-flex gap-2">
              <button class="btn btn-primary" type="submit" id="btnSubmit">Simpan</button>
              <button class="btn btn-outline-secondary" type="button" id="btnReload" style="display:none">Reload</button>
            </div>

            <div class="col-12" id="tokenInfo" style="display:none"></div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/frontend/js/laporan-form.js"></script>
</body>
</html>
