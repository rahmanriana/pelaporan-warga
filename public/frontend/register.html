<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - Pelaporan Warga (API)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/pelaporan.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="card card-laporan">
          <div class="card-body p-4">
            <h4 class="fw-bold mb-1">Register (JWT API)</h4>
            <p class="text-muted mb-4">Buat akun warga untuk mengakses API.</p>

            <div id="alert"></div>

            <form id="formRegister">
              <div class="mb-3">
                <label class="form-label">Nama</label>
                <input class="form-control" name="name" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" minlength="6" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Konfirmasi Password</label>
                <input class="form-control" type="password" name="password_confirmation" minlength="6" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Register</button>
            </form>

            <div class="text-center mt-3">
              <a href="/frontend/login.html" class="text-decoration-none">Sudah punya akun? Login</a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/frontend/js/register.js"></script>
</body>
</html>
