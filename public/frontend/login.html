<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Pelaporan Warga (API)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/pelaporan.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card card-laporan">
          <div class="card-body p-4">
            <h4 class="fw-bold mb-1">Login (JWT API)</h4>
            <p class="text-muted mb-4">Masuk untuk mengakses resource via REST API.</p>

            <div id="alert"></div>

            <form id="formLogin">
              <div class="mb-3">
                <label class="form-label">Email / Username</label>
                <input class="form-control" name="email" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>

            <div class="text-center mt-3">
              <a href="/frontend/register.html" class="text-decoration-none">Belum punya akun? Register</a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/frontend/js/login.js"></script>
</body>
</html>
